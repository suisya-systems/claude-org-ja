name: tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install shell test dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Install Python dependencies (pyproject.toml editable)
        # Phase 5c (Issue #130): canonical install is now `pip install -e .`
        # backed by pyproject.toml. requirements.txt is kept as a thin
        # pointer for tooling that still references it.
        run: pip install -e .

      - name: Run Python tests
        run: python -m unittest discover -s tests -v

      - name: Run tools/ Python tests
        run: python -m unittest discover -s tools -p 'test_*.py' -v

      - name: Check runtime schema drift (Issue #130 Phase 5c)
        # Compares ja's tools/org_extension_schema.json against the
        # schema bundled inside the pinned claude-org-runtime. Skips
        # with a warning when the installed runtime is outside ja's
        # pin window, so a runtime preview release does not block ja
        # PRs unrelated to the schema.
        run: python tools/check_runtime_schema_drift.py

      - name: Check role configs integrity (Issue #85)
        # --include-worker-settings . enumerates `<repo>/*/.claude/settings.local.json`
        # and (since core-harness 0.3.1, default include_worktrees=True) also
        # descends one level into `.worktrees/<branch>/`. Refs cross-review M4.
        run: python tools/check_role_configs.py --include-worker-settings .

      - name: Run shell hook tests
        run: bash tests/run-all.sh

      - name: state-db drift_check (Issue #272 / M2.1)
        # M2.1 cutover gate. Rebuild .state/state.db from any tracked
        # markdown / jsonl inputs (--no-strict because .state/* is
        # gitignored, so most inputs are absent in CI), regenerate
        # .state/org-state.md from the DB via the snapshotter, then
        # diff DB-derived structured sections against that file. A
        # non-zero diff means the snapshotter ↔ DB shape disagrees,
        # which would also mean a skill that flips through StateWriter
        # would silently produce broken markdown in production. Fix by
        # adjusting the snapshotter's structured renderer or the writer
        # field set, then re-run locally.
        run: |
          python -m tools.state_db.importer --db .state/state.db --rebuild --no-strict
          python -c "from pathlib import Path; from tools.state_db import connect; from tools.state_db.snapshotter import post_commit_regenerate; conn = connect('.state/state.db'); post_commit_regenerate(conn, Path('.')); conn.close()"
          python -m tools.state_db.drift_check --db .state/state.db --markdown .state/org-state.md
