name: Bug report
description: Something is broken or behaving unexpectedly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please fill in as much detail as possible.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: Describe the unexpected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Minimal steps to reproduce.
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Claude Code version, renga version, gh version, Python / Node versions if relevant.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / output
      render: shell
    validations:
      required: false
