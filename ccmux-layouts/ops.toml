# Secretary-only initial layout for aainc-ops.
#
# Usage (from the aainc-ops repo root):
#   ccmux --layout ops
#
# Additional panes (Foreman / Curator / Workers) are spawned
# dynamically via `mcp__ccmux-peers__spawn_pane` from the Secretary's
# `/org-start` flow. (Historical note: pre-#22 the same flow used
# `ccmux split` CLI; the new MCP path is functionally equivalent.)
#
# Override the Secretary startup command by editing `command` below
# or setting a shell alias pointing at your preferred `claude` invocation.
#
# The `--dangerously-load-development-channels server:ccmux-peers`
# flag is required: without it the Claude Code session silently
# drops incoming ccmux-peers channel notifications (MCP tool calls
# `mcp__ccmux-peers__*` still work one-way, but pushes from Foreman /
# Curator / workers never surface and the Secretary looks "alive but
# deaf"). Matches the same flag already passed to Foreman / Curator /
# workers in org-start / org-delegate.
#
# With the flag on first launch Claude Code shows a one-off
# "Load development channel: ccmux-peers?" prompt. Foreman / Curator /
# workers bypass it via `mcp__ccmux-peers__send_keys(enter=true)` in
# org-start. The Secretary is the initial pane that bootstraps
# everything else, so that automated Enter isn't available yet — the
# human operator has to press Enter manually the first time the
# layout launches (and subsequently when Claude Code's session cache
# gets invalidated).

version = 1
name = "ops"

[root]
type = "pane"
id = "secretary"
role = "secretary"
command = "claude --dangerously-load-development-channels server:ccmux-peers"
