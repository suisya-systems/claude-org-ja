# Secretary-only initial layout for aainc-ops.
#
# Usage (from the aainc-ops repo root):
#   ccmux --layout ops
#
# Additional panes (Foreman / Curator / Workers) are spawned
# dynamically via `mcp__ccmux-peers__spawn_pane` from the Secretary's
# `/org-start` flow. (Historical note: pre-#22 the same flow used
# `ccmux split` CLI; the new MCP path is functionally equivalent.)
#
# Override the Secretary startup command by editing `command` below
# or setting a shell alias pointing at your preferred `claude` invocation.
#
# A bare `claude` (or `claude <args>`) is auto-upgraded by ccmux
# to the Alt+P form, so `server:ccmux-peers` channel notifications
# are delivered to the Secretary without an explicit
# `--dangerously-load-development-channels` flag. The same
# auto-upgrade applies to Foreman / Curator / Workers spawned via
# `mcp__ccmux-peers__spawn_pane` from org-start / org-delegate;
# none of them carry the flag any more (see #46). Because the flag
# is gone, the one-off "Load development channel?" prompt is also
# skipped, so no manual Enter is required on first launch.

version = 1
name = "ops"

[root]
type = "pane"
id = "secretary"
role = "secretary"
command = "claude"
