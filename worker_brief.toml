## ゴール (Issue #267 M3) — tooling-only

`../workers/` 130 dir を 3 段階層 (`<project>/_runs/<workstream>/<run>/` + `_research/_runs/<cluster>/<run>/` + `_scratch/_runs/_solo/<run>/` + `_archive/<YYYY-Qx>/...`) に移すための **tooling と runbook** を本 PR で完成させる。

**重要**: live `../workers/` の実行は **本 PR スコープ外**。worker は migration script を実行**しない**。secretary が後続 ops issue で人間判断付きで実行する。

設計成果物（必読、worker dir 外、git 管理外）:
- `C:/Users/iwama/Documents/work/workers/state-db-hierarchy-design/migration-strategy.md` §M3 — DoD
- `C:/Users/iwama/Documents/work/workers/state-db-hierarchy-design/directory-layout.md` — target layout
- `C:/Users/iwama/Documents/work/workers/state-db-hierarchy-design/inventory.json` — 130 entries の最新分類 (refinement #269 後、parent_workstream 設定済)

