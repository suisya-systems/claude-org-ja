## 成果物

### 1. `tools/state_db/migrate_workers.py` — migration script

CLI:
```bash
python -m tools.state_db.migrate_workers --plan        # dry-run、mv 計画を出力 (実行しない)
python -m tools.state_db.migrate_workers --apply       # 実行 (要 --confirm)
python -m tools.state_db.migrate_workers --apply --confirm
python -m tools.state_db.migrate_workers --rollback    # 直前 apply の rollback (manifest 必要)
```

主要機能:

#### 1a. inventory 読み込み
`inventory.json` (worker dir 外、引数で渡す or claude-org-ja repo に取り込む判断は worker)。各 entry の `proposed_classification.tier` / `parent_project` / `parent_workstream` から target path を計算。

#### 1b. mv 計画生成 (--plan)
各 entry について:
- `tier='project'`: `../workers/<name>/` → `../workers/<name>/` (no-op、既に project 直下)
- `tier='run'` + `parent_project=X`: `../workers/<name>/` → `../workers/<X>/_runs/<workstream or _solo>/<run>/`
- `tier='scratch'`: `../workers/<name>/` → `../workers/_scratch/_runs/_solo/<name>/`
- `tier='archive_candidate'`: `../workers/<name>/` → `../workers/_archive/2026-Q2/<original_parent>/<name>/` (lifecycle=delete_pending)
- 既に target 位置にあるなら no-op

`_research` クラスタ:
- `parent_project='_research'` + `parent_workstream='ccswarm'`: `../workers/_research/_runs/ccswarm/<run>/`
- `parent_workstream='_solo'`: `../workers/_research/_runs/_solo/<run>/`

`claude-org` / `claude-org-en` スワップ (重要):
- 設計 directory-layout.md §5 の通り中間名経由 3 段 rename:
  - `../workers/claude-org/` → `../workers/claude-org-tmp1/`
  - `../workers/claude-org-en/` → `../workers/claude-org/`
  - `../workers/claude-org-tmp1/` → `../workers/claude-org-ja/`
- これらの順序を必ず計画に明示

出力: human-readable + machine-readable JSON manifest (rollback 用)

#### 1c. apply (--apply --confirm)
1. **pre-flight**: 各 source dir の git worktree 状態確認 (`git -C <project> worktree list`)。worktree がある dir を mv する場合は要 fixup
2. **manifest 書き出し**: `<workers_root>/.m3-migration-manifest-<timestamp>.json` に「`from`, `to`, `worktrees: [...]`」を記録 (rollback 用)
3. **mv 実行**: 計画順序通り。`shutil.move` ではなく `os.rename` (atomic on same filesystem)
4. **worktree fixup**: `mv` 後、各 project 内の `.git/worktrees/<name>/gitdir` の絶対パスを書き換え + `git -C <project> worktree repair` を実行
5. **シンボリック links / junction backward compat** (Windows): 旧 path → 新 path への junction を 1 週間並走 (config 切替) する option `--keep-compat`。default OFF
6. **alternative**: `--manifest` で旧→新 path の JSON を書き出すだけで symlink を作らない選択肢も提供

#### 1d. rollback (--rollback)
最新 manifest を読んで mv を逆順で実行。worktree fixup も逆方向。

### 2. `tools/state_db/test_migrate_workers.py` — temp fs unit tests

minimum 10 ケース:
- `--plan` の出力が inventory と一致
- `claude-org` スワップが中間名経由 3 段で計画される
- worktree を持つ source の検出
- `_research` クラスタ slug の解決 (ccswarm / anthropic / claude-org-audit / _solo)
- `_scratch` 全件 `_solo` 集約
- already-migrated dir の no-op
- apply → 期待構造、rollback で元構造復元
- worktree fixup: mock `git worktree list` → mv → repair の経路
- manifest 書き出し / 読み込みの round-trip
- conflict 検出 (target dir が既存)

すべて temp dir + synthetic inventory + mocked git で完結。**実 ../workers/ には触れない**。

### 3. `tools/state_db/curator_archive.py` — 90 日 hot→cold バッチ

CLI:
```bash
python -m tools.state_db.curator_archive --dry-run      # 移動候補列挙
python -m tools.state_db.curator_archive --apply        # 実行
```

機能:
- `worker_dirs` テーブルで `lifecycle='active'` かつ最終 mtime > 90 日の run dir を列挙
- target path: `_archive/<YYYY-Qx>/<original_project>/<workstream>/<run>/`
  - `<YYYY-Qx>`: 現在 quarter (e.g., 2026-Q2)
- mv 後に DB の `worker_dirs.abs_path` 更新 + `lifecycle='archived'` セット
- `lifecycle='delete_pending'` 行は別途 `--purge` で物理削除

### 4. `tools/state_db/test_curator_archive.py` — 8-10 ケース

- mtime ≤ 90 日 → no-op
- mtime > 90 日 active → archived 移動 + DB 更新
- delete_pending + `--purge` → 物理削除
- target の `<YYYY-Qx>` 計算
- DB トランザクション境界 (mv 失敗時 rollback)

### 5. `docs/operations/m3-migration-runbook.md` — operator runbook

secretary 用の runbook。step-by-step:

1. **pre-flight**:
   - `python -m tools.state_db.importer --rebuild --no-strict` で DB を最新化
   - `python -m tools.state_db.drift_check` で 0 確認
   - `../workers/` のバックアップ (zip or rsync to safe location)
   - 全 active worker pane を suspend (org-suspend)

2. **plan**: `python -m tools.state_db.migrate_workers --plan --inventory <path>` 実行、出力を target/from の sanity check

3. **scratch 先行 dogfood**: `_scratch` のみ subset で apply → success 確認
4. **research 適用**: `_research` cluster apply
5. **project スワップ (危険)**: `claude-org` / `claude-org-en` の中間名 3 段 rename apply。worktree fixup の成否を逐一確認
6. **残 project**: 他の project (ccmux / core-harness / renga 等) を apply
7. **archive_candidate**: `_archive/` 移動

各 step 後の検証:
- `git -C <project> worktree list` で worktree alive
- `git -C <project> status` で working tree clean (mv による影響なし)
- DB `worker_dirs.abs_path` を `python -m tools.state_db.importer --rebuild` で再投入

8. **rollback 手順**: failure 時の `--rollback` 使い方 + 例

### 6. ローカル dogfood (温度低め)

worker は実 `../workers/` には触れない。ただし以下の温度低い検証を PR に含める:

- temp fs に synthetic 30-50 dir 構成を作る fixture script (`scripts/build_synthetic_workers.py` を test 内 helper でも可)
- 実 inventory.json (refinement 後) の 130 entries に対して `--plan` のみ実行 → 出力の sanity check (target path が全部 3 段、claude-org スワップが正しく計画されている等)
- `--apply` は **実行しない**

